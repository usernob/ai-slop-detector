<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Slop Detector</title>
    <link rel="stylesheet" href="./style.css" />
    <meta name="manifest.open_in_tab" content="true" />
</head>

<body>
    <!-- ui is generated by AI slop, how ironic -->

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>AI Slop Detector</h1>
            <p>Pilih jenis media lalu unggah file untuk dideteksi</p>
        </div>

        <!-- Tab Group -->
        <div class="tab-group" role="tablist" aria-label="Jenis media">
            <button class="tab-btn active" data-type="image" role="tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                </svg>
                Gambar
            </button>
            <button class="tab-btn" data-type="audio" role="tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                </svg>
                Audio
            </button>
            <button class="tab-btn" data-type="video" role="tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" />
                </svg>
                Video
            </button>
        </div>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone" role="button" aria-label="Seret file atau klik untuk telusuri">
            <input type="file" id="fileInput" aria-label="Input file" />
            <div class="drop-icon image" id="dropIcon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                </svg>
            </div>
            <h3 id="dropTitle">Seret gambar ke sini</h3>
            <p>atau <span class="browse-link">telusuri file</span></p>
            <div class="format-tags" id="formatTags"></div>
        </div>

        <div class="file-card" id="fileCard" hidden>
            <div class="file-preview" id="filePreview"></div>
            <div class="file-info">
                <div class="file-name" id="fileName"></div>
                <div class="file-meta" id="fileMeta"></div>
            </div>
            <button class="change-btn" id="changeBtn">Ganti file</button>
        </div>

        <button class="btn-primary" id="processBtn" disabled>
            <span id="processBtnLabel">Check File</span>
        </button>

        <!-- Result Card -->
        <div class="result-card state-placeholder" id="resultCard">
            <div class="result-header">
                <div class="result-status-icon" id="resultStatusIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                    </svg>
                </div>
                <div>
                    <h2 class="result-title" id="resultTitle">Belum ada analisis</h2>
                    <p class="result-desc" id="resultDesc">
                        Silakan pilih berkas di atas lalu klik 'Check File' untuk memulai
                        proses deteksi.
                    </p>
                </div>
            </div>
            <div class="result-body">
                <div class="confidence-container">
                    <div class="confidence-header">
                        <span class="confidence-label">Tingkat Keyakinan (Confidence)</span>
                        <span class="confidence-value" id="confidenceValue">0%</span>
                    </div>
                    <div class="confidence-bar-bg">
                        <div class="confidence-bar" id="confidenceBar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- Templates -->
    <template id="tpl-icon-image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
        </svg>
    </template>

    <template id="tpl-icon-audio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
        </svg>
    </template>

    <template id="tpl-icon-video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7" />
            <rect x="1" y="5" width="15" height="14" rx="2" />
        </svg>
    </template>

    <!-- Preview: gambar -->
    <template id="tpl-preview-image">
        <img class="preview-img" alt="Preview gambar" />
    </template>

    <!-- Preview: video -->
    <template id="tpl-preview-video">
        <video class="preview-video" muted></video>
    </template>

    <!-- Preview: audio -->
    <template id="tpl-preview-audio">
        <div class="preview-audio-icon"></div>
        <audio class="preview-audio" controls></audio>
    </template>

    <!-- Result Icons -->
    <template id="tpl-icon-result-ai">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="10" rx="2" />
            <circle cx="12" cy="5" r="2" />
            <path d="M12 7v4M8 15h.01M16 15h.01" />
        </svg>
    </template>

    <template id="tpl-icon-result-human">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
        </svg>
    </template>

    <template id="tpl-icon-result-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="16" x2="12" y2="12" />
            <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
    </template>

    <template id="tpl-icon-result-loading">
        <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="2" x2="12" y2="6" />
            <line x1="12" y1="18" x2="12" y2="22" />
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76" />
            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07" />
            <line x1="2" y1="12" x2="6" y2="12" />
            <line x1="18" y1="12" x2="22" y2="12" />
            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24" />
            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93" />
        </svg>
    </template>

    <script src="./upload.ts" type="module"></script>
</body>

</html>
