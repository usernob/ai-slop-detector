<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Slop Detector</title>
    <link rel="stylesheet" href="./style.css" />
    <meta name="manifest.open_in_tab" content="true" />
</head>

<body>
    <!-- ui is generated by AI slop, how ironic -->

    <div class="container">

        <!-- Header -->
        <div class="header">
            <h1>AI Slop Detector</h1>
            <p>Pilih jenis media lalu unggah file untuk dideteksi</p>
        </div>

        <!-- Tab Group -->
        <div class="tab-group" role="tablist" aria-label="Jenis media">
            <button class="tab-btn active" data-type="image" role="tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                </svg>
                Gambar
            </button>
            <button class="tab-btn" data-type="audio" role="tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                </svg>
                Audio
            </button>
            <button class="tab-btn" data-type="video" role="tab">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" />
                </svg>
                Video
            </button>
        </div>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone" role="button" aria-label="Seret file atau klik untuk telusuri">
            <input type="file" id="fileInput" aria-label="Input file" />
            <div class="drop-icon image" id="dropIcon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                </svg>
            </div>
            <h3 id="dropTitle">Seret gambar ke sini</h3>
            <p>atau <span class="browse-link">telusuri file</span></p>
            <div class="format-tags" id="formatTags"></div>
        </div>

        <div class="file-card" id="fileCard" hidden>
            <div class="file-preview" id="filePreview"></div>
            <div class="file-info">
                <div class="file-name" id="fileName"></div>
                <div class="file-meta" id="fileMeta"></div>
            </div>
            <button class="change-btn" id="changeBtn">Ganti file</button>
        </div>

        <button class="btn-primary" id="processBtn" disabled>
            <span id="processBtnLabel">Check File</span>
        </button>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- Templates -->
    <template id="tpl-icon-image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
        </svg>
    </template>

    <template id="tpl-icon-audio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
        </svg>
    </template>

    <template id="tpl-icon-video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7" />
            <rect x="1" y="5" width="15" height="14" rx="2" />
        </svg>
    </template>

    <!-- Preview: gambar -->
    <template id="tpl-preview-image">
        <img class="preview-img" alt="Preview gambar" />
    </template>

    <!-- Preview: video -->
    <template id="tpl-preview-video">
        <video class="preview-video" muted></video>
    </template>

    <!-- Preview: audio -->
    <template id="tpl-preview-audio">
        <div class="preview-audio-icon"></div>
        <audio class="preview-audio" controls></audio>
    </template>

    <script src="./upload.ts" type="module"></script>
</body>

</html>
